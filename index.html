<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadAble</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Neurodivergent reading assistant</h1>

    <!-- NEW: user input -->
    <textarea id="inputText" placeholder="Paste or type your text here..."></textarea>

    <!-- DISPLAY AREA -->
    <p id="content">
      Your text will appear here...
    </p>

    <div class="controls">
      <input type="color" id="textColor" title="Change text color">
      <button type="button" id="larger">Larger text</button>
      <button type="button" id="smaller">Smaller text</button>
      
      <input type="color" id="bgColor" title="Change background color">

      <button type="button" id="highlight">Highlight</button>
      <button type="button" id="summary">Summarize</button>
    </div>

    <div id="summaryBox"></div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
