<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadAble</title>
  <link rel="stylesheet" href="style.css">

  <!-- Fonts -->
  <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <h1>An afternoon of reading</h1>

    <!-- TEXT INPUT -->
    <textarea id="inputText" placeholder="Paste or type your text here..."></textarea>

    <!-- DISPLAY AREA -->
    <p id="content">Your text will appear here...</p>

    <div class="controls">

      <button id="larger">Larger text</button>
      <button id="smaller">Smaller text</button>

      <!-- FONT SELECT -->
      <label for="fontSelect">Font:</label>
      <select id="fontSelect">
        <option value="Verdana, sans-serif">Verdana</option>
        <option value="Arial, sans-serif">Arial</option>
        <option value="'Open Sans', sans-serif">Open Serif</option>
        <option value="'OpenDyslexic', sans-serif">OpenDyslexic</option>
      </select>

      <!-- TEXT COLOR -->
      <label for="textColor">Text Color:</label>
      <input type="color" id="textColor">

      <!-- BACKGROUND COLOR -->
      <label for="bgColor">Background Color:</label>
      <input type="color" id="bgColor">

      <button id="highlight">Highlight / Unhighlight</button>

    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
